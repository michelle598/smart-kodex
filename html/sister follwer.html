<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IEC Meeting 2026</title>
  <link rel="stylesheet" href="/css/sister follwer.css">
</head>
<body>

  <div class="flyer">

    <!-- Header -->
    <div class="header">
      <img src="/assets/img/sister logo.jpg" alt="Logo" class="logo">
      <h3 style="color: black;">SISTERS’ FELLOWSHIP INT’L</h3>
      <p style="color: black;">Presents:</p>
    </div>

    <!-- Title -->
    <div class="title">
      <h1 style="color: brown;">IEC <span>MEETING</span></h1>
      <div class="year">2026</div>
    </div>

    <!-- Theme -->
    <div class="theme">
      <p style="color: black; font-size: 20px; font-weight: bold;">Theme:</p>
      <h2 style="color:crimson; font-weight: bold; font-size: 25px;">A LEADER <span>WITH</span></h2>

    <div class="bottom">
      <div class="details">

        <p>Thursday – Saturday</p>
        <h3>29TH – 31ST</h3>
        <p>JANUARY, 2026</p>

        <p class="venue">
          <strong>Venue:</strong><br>
          <span style="color: red;">Jesus Transformation Camp,</span><br>
          Along Nkpor / Umuoji Road,<br>
          Nkpor, Anambra State, Nigeria
        </p>

        <p class="host">
          <strong style="color: black; font-weight: bold;"> <button style="background-color: red; border-radius: 100px ;  width: 200px; border: none; margin-right: 20px;">Host:</button></strong><br>
          Rev. Mrs. Nches Iredu<br>
          <small style="color: black;">The Int’l President / Founder SFI</small>
        </p>
      </div>

      <div class="speaker">
        <img src="/assets/img/sister.jpg" alt="Host">
      </div>
    </div>

  </div>
