<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QR Code Card</title>
  <link rel="stylesheet" href="/css/black king.css">
</head>
<body>

  <div class="container">
    <div class="card">
      <div class="qr-box">
        <img src="/assets/img/scan.svg" alt="QR Code">
      </div>

      <h2 style="color: black;">Improve your front-end skills by building projects</h2>
      <p style="color: black;">
        Scan the QR code to visit Frontend Mentor and take your coding skills to the next level
      </p>
    </div>
  </div>

</body>
</html>
