<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Verified</title>
<link rel="stylesheet" href="/css/verified.css">
</head>

<body>

<div class="card">
    <div class="title">Account Verified</div>

    <!-- SVG ICON -->
    <svg class="icon" viewBox="0 0 100 100">
        <polygon points="30,20 70,20 85,50 70,80 30,80 15,50" 
                 fill="none" stroke="#2ecc71" stroke-width="5"/>
        <polyline points="30,50 45,65 75,35" 
                  fill="none" stroke="#2ecc71" stroke-width="5"/>
    </svg>

    <div class="verified">Verified</div>

    <button class="btn" onclick="goBack()">
        <span class="arrow">←</span>
        Back to login
    </button>
</div>

<script>
    // Run this as soon as the page loads
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const titleElement = document.querySelector('.title');

        // Check if the URL contains ?source=forgot
        if (urlParams.get('source') === 'forgot') {
            titleElement.innerText = "OTP Verified";
        }
    };

    function goBack() {
        window.location.href = "proje.html";
    }
</script>


</body>
</html>
