<!DOCTYPE html>
<html>
<head>
  <title>Newspaper Layout</title>
</head>
<body style="background:#fff9c4; padding:20px;">

<table border="1" cellspacing="0" cellpadding="10" align="center">

  <!-- TOP ROW -->
  <tr height="100">
    <td width="120" align="center" style="background-color: white;">
      <b>Mic. Img.</b><br>120px w.
    </td>

    <td width="320" colspan="2" align="center" style="background-color: white;">
      <b>Newspaper Title</b><br>320px w.
    </td>

    <td width="160" align="center" style="background-color: white;">
      <b>News Img.</b><br>160px w.
    </td>
  </tr>

  <!-- HEADLINE ROW -->
  <tr>
    <td rowspan="4" width="120" align="center" style="background-color:white;">
      <b>Navigation</b>
    </td>

    <td colspan="3" align="center" style="background:pink;">
      <b>Headline - 480px w.</b>
    </td>
  </tr>

  <!-- PHOTO + TEXT -->
  <tr>
    <td colspan="2" width="320" height="250" align="center" style="background:pink;">
      <b>Photo of Moon</b><br>320px w.
    </td>

    <td width="160" rowspan="3" align="center" style="background:pink;">
      <b>Text</b><br>160px w.
    </td>
  </tr>

  <!-- CAPTION -->
  <tr>
    <td colspan="2" align="center" style="background:pink;">
      <b>Caption</b>
    </td>
  </tr>

  <!-- BOTTOM TEXT -->
  <tr>
    <td width="160" align="center" style="background:pink;">
      <b>Text</b><br>160px w.
    </td>

    <td width="160" align="center" style="background:pink;">
      <b>Text</b><br>160px w.
    </td>
  </tr>

</table>

</body>
</html>
