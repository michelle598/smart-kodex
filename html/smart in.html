<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Prac2learn - Create Your Account</title>
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
        <link rel="stylesheet" href="/css/smart in .css" />
    </head>
    <body>
        <div class="container">
            <div class="left-section">
                <div class="logo">
                    <img src="/assets/img/Vector.png" width="50" alt srcset />
                    <div class="logo-text">Prac2<span>learn</span></div>
                </div>

                <h1>Create Your Account</h1>
                <p class="subtitle">join a space where real Spark happen</p>

                <form id="signupForm">
                    <div class="form-group">
                        <input type="text" placeholder="Enter your full name"
                            required />
                    </div>

                    <div class="form-group">
                        <input
                            type="text"
                            placeholder="Enter your email or phone"
                            required />
                    </div>

                    <div class="form-group">
                        <div class="password-wrapper">
                            <input
                                type="password"
                                id="password"
                                placeholder="Enter your password"
                                required />
                            <button
                                type="button"
                                class="toggle-password"
                                onclick="togglePassword('password', this)">
                                <i class="fas fa-eye-slash"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="password-wrapper">
                            <input
                                type="password"
                                id="confirmPassword"
                                placeholder="Confirm password"
                                required />
                            <button
                                type="button"
                                class="toggle-password"
                                onclick="togglePassword('confirmPassword', this)">
                                <i class="fas fa-eye-slash"></i>
                            </button>
                        </div>
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="terms" required />
                        <label for="terms">I agree to the <a href="#">terms &
                                privacy policy</a></label>
                    </div>

                    <button
                        type="submit"
                        onclick="window.location.href = 'come.html'"
                        class="signup-btn">
                        Sign up
                    </button>
                </form>
                
                <a href="/html/proje.html" class="login-link"
                    onclick="window.location.href = 'proje.html'">
                    login
                </a>
                <div class="divider">
                    <span>Continue with</span>
                </div>
                
                <div class="social-login">
                    <button class="social-btn google">
                        <img src="/assets/img/Google.png" width="30" alt
                            srcset />
                    </button>
                    <button class="social-btn apple">
                        <img src="/assets/img/Apple Inc.png" width="30" alt
                            srcset />
                    </button>
                </div>
            </div>

            <div class="right-section">
                <img
                    src="/assets/img/Frame 158.png"
                    width="8000"
                    alt="Student with backpack" />
            </div>
        </div>
        <script>
      function togglePassword(inputId, button) {
        const input = document.getElementById(inputId);
        const icon = button.querySelector("i");

        if (input.type === "password") {
          input.type = "text";
          icon.classList.remove("fa-eye-slash");
          icon.classList.add("fa-eye");
        } else {
          input.type = "password";
          icon.classList.remove("fa-eye");
          icon.classList.add("fa-eye-slash");
        }
      }

      document
        .getElementById("signupForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const password = document.getElementById("password").value;
          const confirmPassword =
            document.getElementById("confirmPassword").value;

          if (password !== confirmPassword) {
            alert("Passwords do not match!");
            return;
          }

          alert("Account created successfully!");
          // Add your signup logic here
        });

      // Add smooth focus effects
      const inputs = document.querySelectorAll(
        'input[type="text"], input[type="password"]',
      );
      inputs.forEach((input) => {
        input.addEventListener("focus", function () {
          this.parentElement.style.transform = "scale(1.02)";
        });

        input.addEventListener("blur", function () {
          this.parentElement.style.transform = "scale(1)";
        });
      });
    </script>
    </body>
</html>
