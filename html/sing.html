<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login UI</title>
<link rel="stylesheet" href="/css/sing.css">
</head>

<body>

<div class="container">
    <h1>Welcome Back !</h1>
    <p class="subtitle">
        please sign up to continue and access your account enter your email password to get started.
    </p>

    <form id="loginForm">
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Enter your email or phone">
        </div>

        <div class="options">
            <label>
                <input type="checkbox"> Remember password ?
            </label>
            <a href="#" class="forgot">Forgot password?</a>
        </div>

        <button class="btn">sign in</button>
    </form>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const input = document.getElementById('userInput').value.trim();

    if(input === ''){
        alert('Please enter your email or phone');
    } else {
        alert('Signing in with: ' + input);
    }
});
</script>

</body>
</html>
