<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Account Menu UI</title>
<link rel="stylesheet" href="/css/AUTO.CSS">
</head>
<body>

<div class="menu">

  <!-- Profile -->
  <div class="profile">
    <div class="avatar">
      <img src="https://i.pravatar.cc/150" alt="">
    </div>
    <div>
      <div class="name">Michelle Thomas</div>
      <div class="email">mt099228@gmail.com</div>
      <div class="create">Create a channel</div>
    </div>
  </div>

  <!-- Menu -->
  <div class="item"><div class="icon">G</div>Google Account</div>
  <div class="item"><div class="icon">👤</div>Switch account <span class="arrow">›</span></div>

  <div class="divider"></div>

  <div class="item"><div class="icon">⚙</div>YouTube Studio</div>
  <div class="item"><div class="icon">💰</div>Purchases and memberships</div>
  <div class="item"><div class="icon">📊</div>Your data in YouTube</div>
  <div class="item"><div class="icon">🌙</div>Appearance: Device theme <span class="arrow">›</span></div>
  <div class="item"><div class="icon">🌐</div>Display language: English <span class="arrow">›</span></div>
  <div class="item"><div class="icon">👥</div>Restricted Mode: Off <span class="arrow">›</span></div>
  <div class="item"><div class="icon">📍</div>Location: Nigeria <span class="arrow">›</span></div>
  <div class="item"><div class="icon">⌨</div>Keyboard shortcuts</div>

</div>
