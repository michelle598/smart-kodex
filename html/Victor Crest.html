<!DOCTYPE html>
<html lang="en">
<head>

<title>VICTOR CREST</title>
<link rel="stylesheet" href="/css/uche.css">
</head>
<body>

    <img src="/assets/img/victor.jpg" class="avatar" title="Victor Crest">

    <div class="info">
        <div class="name">Victor Crest <span class="age">26</span></div>

    <div class="stats">

            <div class="number">80K</div>

            <div class="number">803K</div>
            <div class="label">Likes</div>

        <div class="stat">
            <div class="number">1.4K</div>
            <div class="label">Photos</div>
        </div>
    </div>

</div>

</html>
