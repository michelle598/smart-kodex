<!DOCTYPE html>
<html>
<head>
  <title>Table Layout</title>
</head>
<body style="margin:0;">

<table width="100%" height="100vh" border="1" cellspacing="0" cellpadding="0.2">

  <!-- HEADER -->
  <tr style="background:#b9b7d8; height:80px; text-align:center;">
    <td colspan="3"><b>header</b></td>
  </tr>

  <!-- MAIN CONTENT -->
  <tr>

    <!-- LEFT PANE -->
    <td width="20%" style="background:#c9c7e6; text-align:center;">
      <b>left pane</b>
    </td>

    <!-- CENTER CONTENT -->
    <td width="60%" valign="top">

      <table width="100%" height="100%" border="1" cellspacing="0" cellpadding="10">

        <tr style="background:#e6e6e6; height:80px; text-align:center;">
          <td><b> <img src="/assets/img/kitty-cat-munchkin-fluffy-animal-pet-sleeping-bed_1048944-24752591.avif" alt="" width="500" title="pre-boby"></b></td>
        </tr>

        <tr style="height:300px; text-align:center;">
          <td><b> <img src="/assets/img/young-adults-having-block-party_23-2149571514.avif" alt="" width="450" title="body (content)"></b></td>
        </tr>

        <tr style="background:#e6e6e6; height:100px; text-align:center;">
          <td><b> <img src="/assets/img/front-view-man-eating-seaweed-snacks_23-2150872520.avif" alt="" width="450" title="post-body"></b></td>
        </tr>

      </table>

    </td>

    <!-- RIGHT PANE -->
    <td width="20%" style="background:#c9c7e6; text-align:center;">
      <b>right pane</b>
    </td>

  </tr>

  <!-- FOOTER -->
  <tr style="background:#b9b7d8; height:80px; text-align:center;">
    <td colspan="3"><b>footer</b></td>
  </tr>

</table>

</body>
</html>
