<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prac2learn - Welcome Back</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/projet.css">
</head>
<body>
    <div class="container">
        <div class="left-section">
            <div class="logo">
                <img src="/assets/img/Vector.png" width="50" alt="" srcset="">
                <!-- <img class="logo-icon"></img> -->
                <div class="logo-text">Prac2<span>learn</span></div>
            </div>

            <h1>Welcome Back</h1>
            <p class="subtitle">Login to your account to continue</p>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="input-field" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" class="input-field" placeholder="Enter your password" required>
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            <i class="fas fa-eye" id="toggleIcon"></i>
                        </button>
                    </div>
                </div>

                <div class="options">
                    <label class="remember-me">
                        <input type="checkbox" id="remember">
                        <span>Remember me</span>
                    </label>
                    <a href="/html/forget.html" id="forgot-password" class="forgot-password">Forgot password?</a>
                </div>
                <button type="submit" class="login-btn">Login</button>
            </form>

            <div class="divider">
                <span>Continue with</span>
            </div>

            <div class="social-login">
                <button class="social-btn google" onclick="socialLogin('google')">
                     <img src="/assets/img/Google.png" width="30" alt="" srcset="">
                </button>
                <button class="social-btn apple" onclick="socialLogin('apple')">
                     <img src="/assets/img/Apple Inc.png" width="30" alt="" srcset="">
                </button>
            </div>

            <div class="signup-link">
                Don't have an account?
                <a href="./smart in.html" onclick="showSignup()">Sign UP</a>
                <!-- Don't have an account? <a onclick="showSignup()"> <link rel="stylesheet" href="./smart in.html">Sign up</a> -->
            </div>
        </div>

        <div class="right-section">
            <img src="/assets/img/Rectangle 11.png" alt="Student in campus">
        </div>
    </div>

    <script src="/JS/proje.js"></script>
</body>
</html>
