<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="/new work/box.css" />
  </head>
  <body>
    <!-- BASIC INCREMENT -->
    <section class="step step1">
      <h2>Step 1: Basic Increment</h2>
      <p>Click the + button to increment the counter.</p>
      <div class="counter-display" id="count1">0</div>
      <button id="increaseBtn1">+</button>
    </section>

    <!-- INCREMENT AND DECREMENT -->
    <section class="step step2">
      <h2>Step 2: Increment and Decrement</h2>
      <p>
        Click the + button to increment the counter and - button to decrement
        the counter.
      </p>
      <div id="count2">0</div>
      <button id="increaseBtn2">+</button>
      <button id="decreaseBtn2">-</button>
      <button id="resetBtn2">Reset</button>
    </section>

    <!-- STEP3 : MIN AND MAX LIMITS -->
    <section>
      <h2>Step 3: Min and Max Limit</h2>
      <p>Count is restricted between 0 and 20</p>

      <div class="counter-display" id="count3">0</div>
      <button id="increaseBtn3">+</button>
      <button id="decreaseBtn3">-</button>
    </section>
    <script src="/new work/box.js"></script>
  </body>
</html>
